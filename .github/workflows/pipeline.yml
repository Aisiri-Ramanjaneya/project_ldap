name: LDAP Auth — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── CI: Backend ──────────────────────────────────────────
  backend-ci:
    name: Backend — install & check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b62b6d0ad9b0af0fb3b1e40be53ce9b9 # v4.2.0
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Check server starts (smoke test)
        working-directory: backend
        env:
          JWT_SECRET: ci-test-secret
          LDAP_URL: ldap://localhost:10389
          LDAP_BASE_DN: dc=example,dc=com
          LDAP_USER_OU: ou=users,dc=example,dc=com
          LDAP_ADMIN_DN: uid=admin,ou=system
          LDAP_ADMIN_PASSWORD: secret
        run: |
          node -e "require('./server.js')" &
          sleep 3
          curl -f http://localhost:5000/api/health || exit 1
          kill %1

  # ── CI: Frontend ─────────────────────────────────────────
  frontend-ci:
    name: Frontend — install & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js
        uses: actions/setup-node@1d0ff469b62b6d0ad9b0af0fb3b1e40be53ce9b9 # v4.2.0
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build React app
        working-directory: frontend
        env:
          CI: false
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: frontend-build
          path: frontend/build/

  # ── CD: Deploy (runs only on push to main) ───────────────
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download frontend build
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: frontend-build
          path: frontend/build/

      # ── Option A: Deploy to Render / Railway ──
      # Uncomment below and add RENDER_DEPLOY_HOOK to GitHub Secrets
      # - name: Trigger Render deploy
      #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      # ── Option B: Deploy to a VPS via SSH ────
      # Uncomment below and add SSH_HOST, SSH_USER, SSH_KEY to Secrets
      # - name: Deploy to VPS
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.SSH_HOST }}
      #     username: ${{ secrets.SSH_USER }}
      #     key: ${{ secrets.SSH_KEY }}
      #     script: |
      #       cd /var/www/ldap-app
      #       git pull origin main
      #       cd backend && npm install --production
      #       pm2 restart ldap-backend

      - name: Deployment ready
        run: |
          echo "✅ Both CI jobs passed."
          echo "Frontend build is ready."
          echo "Uncomment one deploy option above to go live."